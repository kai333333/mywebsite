<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>经典俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            flex-direction: column;
            gap: 20px;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* 游戏主画布 */
        #game-board {
            border: 3px solid #ffffff;
            background-color: #000;
        }

        /* 右侧信息面板 */
        .info-panel {
            color: white;
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 18px;
        }

        .score-box, .next-box {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            width: 180px;
        }

        h3 {
            color: #00ff00;
            margin-bottom: 10px;
        }

        /* 按钮样式 */
        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background: #00ccff;
            color: #000;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #0088bb;
            color: white;
        }

        /* 下一个方块预览画布 */
        #next-piece {
            border: 2px solid #fff;
            background: #000;
        }
    </style>
</head>
<body>
    <h1 style="color: white;">经典俄罗斯方块</h1>
    <div class="game-container">
        <!-- 游戏主区域 -->
        <canvas id="game-board" width="300" height="600"></canvas>
        
        <!-- 右侧信息面板 -->
        <div class="info-panel">
            <div class="score-box">
                <h3>当前得分</h3>
                <p id="score">0</p>
            </div>
            <div class="next-box">
                <h3>下一个方块</h3>
                <canvas id="next-piece" width="120" height="120"></canvas>
            </div>
            <div class="btn-group">
                <button id="start-btn">开始游戏</button>
                <button id="pause-btn">暂停游戏</button>
                <button id="reset-btn">重新开始</button>
            </div>
        </div>
    </div>

    <script>
        // ===================== 游戏基础配置 =====================
        const ROWS = 20;    // 行数
        const COLS = 10;    // 列数
        const BLOCK_SIZE = 30;  // 每个方块大小
        const CANVAS = document.getElementById('game-board');
        const CTX = CANVAS.getContext('2d');
        const NEXT_CANVAS = document.getElementById('next-piece');
        const NEXT_CTX = NEXT_CANVAS.getContext('2d');
        
        // 俄罗斯方块7种基础形状（坐标矩阵）
        const SHAPES = [
            [[1,1,1,1]],  // I型
            [[1,1],[1,1]],// O型
            [[0,1,0],[1,1,1]], // T型
            [[1,0,0],[1,1,1]], // L型
            [[0,0,1],[1,1,1]], // 反L型
            [[1,1,0],[0,1,1]], // Z型
            [[0,1,1],[1,1,0]]  // 反Z型
        ];

        // 方块对应颜色
        const COLORS = [
            '#00ffff', '#ffff00', '#a020f0',
            '#ffa500', '#0000ff', '#00ff00', '#ff0000'
        ];

        // ===================== 游戏变量 =====================
        let board = [];        // 游戏棋盘数组
        let currentShape;      // 当前方块
        let currentColor;      // 当前方块颜色
        let currentX;          // 当前方块X坐标
        let currentY;          // 当前方块Y坐标
        let nextShape;         // 下一个方块
        let nextColor;         // 下一个方块颜色
        let score = 0;         // 分数
        let gameInterval;      // 下落定时器
        let isGameOver = false;// 游戏结束标记
        let isPaused = false;  // 暂停标记

        // ===================== 初始化棋盘 =====================
        function initBoard() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        }

        // ===================== 随机生成方块 =====================
        function randomShape() {
            const index = Math.floor(Math.random() * SHAPES.length);
            return { shape: SHAPES[index], color: COLORS[index] };
        }

        // ===================== 生成当前方块和下一个方块 =====================
        function spawnShape() {
            const first = randomShape();
            const second = randomShape();
            
            currentShape = first.shape;
            currentColor = first.color;
            nextShape = second.shape;
            nextColor = second.color;

            // 初始位置（居中）
            currentX = Math.floor(COLS / 2) - Math.floor(currentShape[0].length / 2);
            currentY = 0;

            // 生成即碰撞 = 游戏结束
            if (collisionCheck(currentShape, currentX, currentY)) {
                isGameOver = true;
            }
        }

        // ===================== 碰撞检测 =====================
        function collisionCheck(shape, x, y) {
            for (let row = 0; row < shape.length; row++) {
                for (let col = 0; col < shape[row].length; col++) {
                    if (shape[row][col]) {
                        const newX = x + col;
                        const newY = y + row;
                        // 超出边界/碰到已落下的方块 = 碰撞
                        if (
                            newX < 0 || newX >= COLS ||
                            newY >= ROWS ||
                            (newY >= 0 && board[newY][newX])
                        ) return true;
                    }
                }
            }
            return false;
        }

        // ===================== 绘制游戏 =====================
        function drawGame() {
            // 清空画布
            CTX.fillStyle = '#000';
            CTX.fillRect(0, 0, CANVAS.width, CANVAS.height);

            // 绘制已固定的方块
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col]) {
                        drawBlock(CTX, col, row, board[row][col]);
                    }
                }
            }

            // 绘制当前下落方块
            for (let row = 0; row < currentShape.length; row++) {
                for (let col = 0; col < currentShape[row].length; col++) {
                    if (currentShape[row][col]) {
                        drawBlock(CTX, currentX + col, currentY + row, currentColor);
                    }
                }
            }

            // 绘制下一个方块预览
            drawNextPiece();
        }

        // ===================== 绘制单个方块 =====================
        function drawBlock(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
        }

        // ===================== 绘制下一个方块预览 =====================
        function drawNextPiece() {
            NEXT_CTX.fillStyle = '#000';
            NEXT_CTX.fillRect(0, 0, NEXT_CANVAS.width, NEXT_CANVAS.height);
            
            const offsetX = (NEXT_CANVAS.width / 2) - (nextShape[0].length * BLOCK_SIZE / 2);
            const offsetY = (NEXT_CANVAS.height / 2) - (nextShape.length * BLOCK_SIZE / 2);

            for (let row = 0; row < nextShape.length; row++) {
                for (let col = 0; col < nextShape[row].length; col++) {
                    if (nextShape[row][col]) {
                        NEXT_CTX.fillStyle = nextColor;
                        NEXT_CTX.fillRect(
                            offsetX + col * BLOCK_SIZE,
                            offsetY + row * BLOCK_SIZE,
                            BLOCK_SIZE - 1,
                            BLOCK_SIZE - 1
                        );
                        NEXT_CTX.strokeStyle = '#fff';
                        NEXT_CTX.strokeRect(
                            offsetX + col * BLOCK_SIZE,
                            offsetY + row * BLOCK_SIZE,
                            BLOCK_SIZE - 1,
                            BLOCK_SIZE - 1
                        );
                    }
                }
            }
        }

        // ===================== 固定下落到底的方块 =====================
        function fixShape() {
            for (let row = 0; row < currentShape.length; row++) {
                for (let col = 0; col < currentShape[row].length; col++) {
                    if (currentShape[row][col]) {
                        const x = currentX + col;
                        const y = currentY + row;
                        if (y >= 0) board[y][x] = currentColor;
                    }
                }
            }
            clearLines(); // 消行
            spawnShape(); // 生成新方块
        }

        // ===================== 消除满行 =====================
        function clearLines() {
            let linesCleared = 0;
            for (let row = ROWS - 1; row >= 0; row--) {
                if (board[row].every(cell => cell)) {
                    // 删除满行，顶部添加空行
                    board.splice(row, 1);
                    board.unshift(Array(COLS).fill(0));
                    row++; // 重新检查当前行
                    linesCleared++;
                }
            }
            // 计分规则：消1行100分，2行300，3行500，4行800
            if (linesCleared > 0) {
                score += [0, 100, 300, 500, 800][linesCleared];
                document.getElementById('score').textContent = score;
            }
        }

        // ===================== 方块下落 =====================
        function dropDown() {
            if (isGameOver || isPaused) return;
            if (!collisionCheck(currentShape, currentX, currentY + 1)) {
                currentY++;
            } else {
                fixShape();
            }
            drawGame();
        }

        // ===================== 方块旋转 =====================
        function rotateShape() {
            // 矩阵转置+反转 = 旋转
            const rotated = currentShape[0].map((_, idx) => 
                currentShape.map(row => row[idx]).reverse()
            );
            if (!collisionCheck(rotated, currentX, currentY)) {
                currentShape = rotated;
            }
        }

        // ===================== 键盘控制 =====================
        document.addEventListener('keydown', (e) => {
            if (isGameOver || isPaused) return;
            
            // 左箭头
            if (e.key === 'ArrowLeft' && !collisionCheck(currentShape, currentX - 1, currentY)) {
                currentX--;
            }
            // 右箭头
            else if (e.key === 'ArrowRight' && !collisionCheck(currentShape, currentX + 1, currentY)) {
                currentX++;
            }
            // 下箭头（加速下落）
            else if (e.key === 'ArrowDown') {
                dropDown();
            }
            // 上箭头（旋转）
            else if (e.key === 'ArrowUp') {
                rotateShape();
            }
            drawGame();
        });

        // ===================== 游戏开始 =====================
        function startGame() {
            initBoard();
            spawnShape();
            score = 0;
            isGameOver = false;
            isPaused = false;
            document.getElementById('score').textContent = score;
            clearInterval(gameInterval);
            gameInterval = setInterval(dropDown, 800); // 800ms下落一次
            drawGame();
        }

        // ===================== 暂停/继续 =====================
        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            document.getElementById('pause-btn').textContent = isPaused ? '继续游戏' : '暂停游戏';
        }

        // ===================== 按钮绑定 =====================
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('pause-btn').addEventListener('click', togglePause);
        document.getElementById('reset-btn').addEventListener('click', startGame);
    </script>
</body>
</html>
